<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body>
<div class="px-4 py-8 max-w-5xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Get All Students Information</h1>

    <div class="overflow-x-auto shadow-md rounded-lg border border-gray-200">
        <table class="min-w-full divide-y divide-gray-200 bg-white">
            <thead class="bg-gray-100">
            <tr>
                <th class="px-6 py-3.5 text-left text-sm font-semibold text-gray-700 uppercase tracking-wider">
                    Student Id
                </th>
                <th class="px-6 py-3.5 text-left text-sm font-semibold text-gray-700 uppercase tracking-wider">
                    Student First Name
                </th>
                <th class="px-6 py-3.5 text-left text-sm font-semibold text-gray-700 uppercase tracking-wider">
                    Student Last Name
                </th>
                <th class="px-6 py-3.5 text-left text-sm font-semibold text-gray-700 uppercase tracking-wider">
                    Student Email
                </th>
                <th class="px-6 py-3.5 text-left text-sm font-semibold text-gray-700 uppercase tracking-wider">
                    Actions
                </th>
            </tr>
            </thead>
            <tbody class="divide-y divide-gray-200 bg-white">
            <tr th:each="student : ${studentList}" class="hover:bg-gray-50 transition-colors duration-150">
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700"><span th:text="${student.id}"></span></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900"><span
                        th:text="${student.firstName}"></span></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900"><span
                        th:text="${student.lastName}"></span></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600"><span th:text="${student.email}"></span>
                </td>

                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                    <button
                        th:attr="data-id=${student.id}"
                        class="text-white bg-gradient-to-r from-blue-500 via-blue-600 to-blue-700 hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-blue-300 dark:focus:ring-blue-800 font-medium rounded-base text-sm px-4 py-2 text-center leading-5"
                        title="Update student"
                        onclick="">
                        Update
                    </button>
                    <button
                            th:attr="data-id=${student.id}"
                            class="text-white bg-gradient-to-r from-red-400 via-red-500 to-red-600 hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-red-300 dark:focus:ring-red-800 font-medium rounded-base text-sm px-4 py-2 text-center leading-5"
                            title="Delete student"
                            onclick="">
                        Delete
                    </button>
                </td>

            </tr>
            <tr th:if="${#lists.isEmpty(studentList)}">
                <td colspan="4" class="px-6 py-10 text-center text-gray-500 text-sm">
                    No students found
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
