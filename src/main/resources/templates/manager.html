<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manager Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4">
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-lg shadow p-6 mb-1">
        <h1 class="text-2xl text-center font-bold text-gray-900 mb-1">Welcome <span th:text="${name}"></span></h1>

        <div class="bg-green-50 border border-green-200 rounded p-3 mb-6">
            <p class="text-green-800 text-sm">
                You have MANAGER role access.
            </p>
        </div>

        <h2 class="font-bold text-gray-900 mb-2 mt-2">What you can do:</h2>
        <ul class="list-disc list-inside text-gray-700 text-sm space-y-1">
            <li>View team report</li>
            <li>Manage projects</li>
            <li>Access manager only data</li>
            <li>Team oversight</li>
        </ul>

        <div class="flex gap-3 mt-6">
            <a th:href="@{/home}"
               class="flex-1 bg-indigo-600 text-white text-center py-2 rounded hover:bg-indigo-700">Home</a>
        </div>
    </div>
</div>
</body>
</html>
